<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Оплата — Divane Client</title>
  <style>
    :root {
      --bg: #0b0b0d;
      --card: #121316;
      --border: #2a2b30;
      --text: #f2f2f5;
      --muted: #9a9aa3;
      --accent: #8f72ff;
      --ok: #4ade80;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(circle at top, #1a1430 0%, var(--bg) 45%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: min(560px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }
    h1 { margin: 0 0 8px; font-size: 1.5rem; }
    .sub { color: var(--muted); margin-bottom: 24px; }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .row:last-of-type { border-bottom: none; }
    .label { color: var(--muted); }
    .value { font-weight: 600; text-align: right; word-break: break-all; }
    .amount { color: var(--accent); font-size: 1.25rem; }
    .pay-box {
      margin-top: 20px;
      padding: 16px;
      border-radius: 12px;
      background: rgba(143, 114, 255, 0.08);
      border: 1px solid rgba(143, 114, 255, 0.25);
    }
    .pay-box strong { display: block; margin-bottom: 8px; }
    .qr-wrap {
      display: flex;
      justify-content: center;
      margin: 16px 0 8px;
    }
    .qr-wrap img {
      width: 240px;
      height: 240px;
      border-radius: 12px;
      background: #fff;
      padding: 12px;
      object-fit: contain;
    }
    .qr-hint {
      margin: 0;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }
    .steps { margin: 20px 0 0; padding-left: 18px; color: var(--muted); line-height: 1.6; }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 18px;
      border-radius: 10px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      font-weight: 600;
    }
    .btn.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      margin-left: 8px;
    }
    .error { color: #f87171; }
    .status { color: var(--ok); font-weight: 600; }
  </style>
</head>
<body>
  <div class="card" id="app">
    <h1>Загрузка заказа...</h1>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const orderId = params.get('order');
    const app = document.getElementById('app');

    function fmtCard(num) {
      return String(num).replace(/\D/g, '').replace(/(\d{4})(?=\d)/g, '$1 ').trim();
    }

    function sbpQrImageSrc(sbpQr) {
      if (sbpQr.type === 'image') return sbpQr.imageUrl;
      if (sbpQr.type === 'link') {
        return 'https://api.qrserver.com/v1/create-qr-code/?size=240x240&margin=12&data='
          + encodeURIComponent(sbpQr.linkUrl);
      }
      return '';
    }

    function renderSbpPayBox(sbpQr) {
      if (sbpQr.type === 'missing') {
        return `<div class="pay-box"><strong>СБП QR ещё не настроен</strong><p class="qr-hint" style="text-align:left">Администратору нужно загрузить QR-код из банковского приложения в <code>assets/payments/sbp-qr.png</code> или указать ссылку СБП в настройках.</p></div>`;
      }

      const qrSrc = sbpQrImageSrc(sbpQr);
      return `<div class="pay-box">
        <strong>Оплата по СБП</strong>
        <div class="qr-wrap"><img src="${qrSrc}" alt="QR-код для оплаты по СБП"></div>
        <p class="qr-hint">Отсканируйте QR в приложении банка и переведите <strong>${sbpQr.amount} ₽</strong>.<br>В комментарии укажите заказ <strong>#${sbpQr.orderId}</strong>.</p>
      </div>`;
    }

    async function load() {
      if (!orderId) {
        app.innerHTML = '<h1 class="error">Заказ не найден</h1><p class="sub">Неверная ссылка оплаты.</p><a class="btn secondary" href="/">На главную</a>';
        return;
      }
      try {
        const res = await fetch('/api/payments/order/' + encodeURIComponent(orderId));
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Order not found');

        const payDetail = data.paymentType === 'SBP'
          ? renderSbpPayBox(data.sbpQr)
          : data.paymentType === 'CARD_MIR'
          ? `<div class="pay-box"><strong>Переведите на карту:</strong><div class="value amount">${fmtCard(data.card)}</div></div>`
          : data.paymentType === 'FUNPAY'
          ? `<div class="pay-box"><strong>Оплата через FunPay:</strong><p style="margin:8px 0 0;color:var(--muted)">Перейдите на профиль продавца и оформите заказ. В сообщении укажите номер заказа <strong>#${data.id}</strong> и логин <strong>${data.username}</strong>.</p><a class="btn" href="${data.funpayUrl}" target="_blank" rel="noopener" style="margin-top:12px">Открыть FunPay</a></div>`
          : '';

        app.innerHTML = `
          <h1>Оплата заказа</h1>
          <p class="sub">Переведите точную сумму и подтвердите оплату в Discord.</p>
          <div class="row"><span class="label">Заказ</span><span class="value">#${data.id}</span></div>
          <div class="row"><span class="label">Аккаунт</span><span class="value">${data.username}</span></div>
          <div class="row"><span class="label">Товар</span><span class="value">${data.productLabel}</span></div>
          <div class="row"><span class="label">Способ</span><span class="value">${data.paymentLabel}</span></div>
          <div class="row"><span class="label">Сумма</span><span class="value amount">${data.amount} ₽</span></div>
          <div class="row"><span class="label">Статус</span><span class="value status">${data.status === 'pending' ? 'Ожидает оплаты' : data.status}</span></div>
          ${payDetail}
          <ol class="steps">
            <li>${data.paymentType === 'FUNPAY' ? `Оформите покупку на FunPay на сумму <strong>${data.amount} ₽</strong>.` : data.paymentType === 'SBP' ? `Отсканируйте QR-код и переведите <strong>${data.amount} ₽</strong>.` : `Переведите <strong>${data.amount} ₽</strong> на указанные реквизиты.`}</li>
            <li>В комментарии или сообщении укажите номер заказа: <strong>#${data.id}</strong>.</li>
            <li>Зайдите в Discord и отправьте скриншот оплаты + ваш логин <strong>${data.username}</strong>.</li>
            <li>После проверки подписка будет выдана вручную.</li>
          </ol>
          <a class="btn" href="${data.discord}" target="_blank" rel="noopener">Подтвердить в Discord</a>
          <a class="btn secondary" href="/">На главную</a>
        `;
      } catch (e) {
        app.innerHTML = `<h1 class="error">Ошибка</h1><p class="sub">${e.message}</p><a class="btn secondary" href="/">На главную</a>`;
      }
    }

    load();
  </script>
</body>
</html>
